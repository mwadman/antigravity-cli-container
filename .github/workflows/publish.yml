name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build and push'
        required: true
        type: string

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check if image exists
        id: check_image
        run: |
          TARGET=${{ github.event.inputs.version }}
          # Check if tag exists on Docker Hub
          TOKEN=$(curl -s "https://auth.docker.io/token?service=registry.docker.io&scope=repository:michaelwadman/antigravity-cli:pull" | jq -r .token)
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $TOKEN" "https://index.docker.io/v2/michaelwadman/antigravity-cli/manifests/$TARGET")

          if [ "$HTTP_STATUS" -eq "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image michaelwadman/antigravity-cli:$TARGET already exists."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Image michaelwadman/antigravity-cli:$TARGET does not exist. Proceeding with build."
          fi

      - name: Set up QEMU
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            ANTIGRAVITY_VERSION=${{ github.event.inputs.version }}
          tags: |
            michaelwadman/antigravity-cli:${{ github.event.inputs.version }}
            michaelwadman/antigravity-cli:latest
